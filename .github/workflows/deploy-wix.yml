# ENVIRONMENT: PRODUCTION — canonical end-to-end deploy for https://www.jysenglish.com/?app=jys-hr
# Order: secret scan → build id → Apps Script backend → health==build → Wix bundle → production verification.
# Path kept as deploy-wix.yml because docs reference it as the canonical production workflow.
name: Deploy HR (backend + Wix) and verify

on:
  push:
    branches: [main]
    paths:
      - "production/jys_quan_ly_nhan_su.html"
      - "production/Code.gs"
      - "scripts/**"
      - ".github/workflows/deploy-wix.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-hr
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      API_URL:      ${{ secrets.API_URL }}
      WIX_API_KEY:  ${{ secrets.WIX_API_KEY }}
      WIX_SITE_ID:  ${{ vars.WIX_SITE_ID  || 'a3bfa336-e918-48e6-831b-82ed7ff178f5' }}
      WIX_EMBED_ID: ${{ vars.WIX_EMBED_ID || '516cefe5-e0bb-4b1c-9d06-5bb16dd6482f' }}
      GAS_SCRIPT_ID:         ${{ secrets.GAS_SCRIPT_ID }}
      GAS_DEPLOYMENT_ID:     ${{ secrets.GAS_DEPLOYMENT_ID }}
      CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
      ALERT_WEBHOOK_URL:     ${{ secrets.ALERT_WEBHOOK_URL }}
      FULL_E2E_REQUIRED:     ${{ vars.FULL_E2E_REQUIRED || 'false' }}
      E2E_MANAGER_CODE:      ${{ secrets.E2E_MANAGER_CODE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Preflight — required secrets present
        run: |
          set -eu
          missing=""
          [ -n "${API_URL:-}" ]                || missing="$missing API_URL"
          [ -n "${WIX_API_KEY:-}" ]            || missing="$missing WIX_API_KEY"
          [ -n "${GAS_SCRIPT_ID:-}" ]          || missing="$missing GAS_SCRIPT_ID"
          [ -n "${CLASP_CREDENTIALS_JSON:-}" ] || missing="$missing CLASP_CREDENTIALS_JSON"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Set them in repo Settings → Secrets. Refusing to deploy a partial/mismatched stack."
            exit 1
          fi
          echo "All required secrets present."

      - name: Secret scan
        run: npm run scan:secrets

      - name: Generate BUILD_ID
        run: |
          set -eu
          BUILD_ID="$(date -u +%Y%m%d-%H%M%SZ)-$(git rev-parse --short HEAD)"
          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "Build ID: $BUILD_ID"

      - name: Deploy Apps Script backend (first)
        run: npm run deploy:gas

      - name: Confirm backend health == BUILD_ID
        run: |
          set -eu
          mkdir -p artifacts
          ok=0
          # -L is required: Apps Script /exec 302-redirects to googleusercontent.com.
          for i in 1 2 3 4 5 6; do
            if curl -fsSL "${API_URL}?action=health&requestId=ci-${GITHUB_RUN_ID}-$i" -o artifacts/health.json; then ok=1; break; fi
            sleep 5
          done
          [ "$ok" = "1" ] || { echo "::error::Backend health endpoint unreachable"; exit 1; }
          HV=$(node -e "const h=require('./artifacts/health.json');process.stdout.write(String(h.backendBuild||h.version||''))")
          echo "Backend build: $HV  | Expected: $BUILD_ID"
          if [ "$HV" != "$BUILD_ID" ]; then
            echo "::error::Backend build ($HV) != BUILD_ID ($BUILD_ID). If you use a fixed /exec URL, set GAS_DEPLOYMENT_ID to that deployment so clasp updates it in place."
            exit 1
          fi

      - name: Deploy Wix bundle (after backend)
        run: npm run deploy:wix

      - name: Install Playwright Chromium
        run: npx --yes playwright install --with-deps chromium

      - name: Verify production
        env:
          EXPECTED_BUILD: ${{ env.BUILD_ID }}
        run: npm run verify:production

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-verification-${{ env.BUILD_ID }}
          path: |
            artifacts/deploy-manifest.json
            artifacts/health.json
            artifacts/verification-summary.md
            artifacts/*.png
            artifacts/console-log.json
            artifacts/network-failures.json
          if-no-files-found: warn

      - name: Rollback instructions on failure
        if: ${{ failure() }}
        run: |
          echo "::group::Rollback"
          echo "Deploy/verify FAILED for build ${BUILD_ID:-unknown}."
          echo "1. Re-run .github/workflows/deploy-wix.yml from the last known-good commit (Run workflow → pick commit)."
          echo "2. Or re-point the Wix Custom Embed BUNDLE_URL to the previous artifacts/deploy-manifest.json bundleUrl."
          echo "3. Confirm ${API_URL:+API_URL}?action=health returns the matching build and canonical page renders."
          echo "::endgroup::"

      - name: Alert webhook on failure
        if: ${{ failure() && env.ALERT_WEBHOOK_URL != '' }}
        run: |
          set +e
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"service\":\"jys-hr\",\"buildId\":\"${BUILD_ID:-}\",\"commitSha\":\"${GITHUB_SHA}\",\"workflowRunUrl\":\"${RUN_URL}\",\"failedStep\":\"deploy/verify\"}" \
            "$ALERT_WEBHOOK_URL" || true
