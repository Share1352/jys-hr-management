# ENVIRONMENT: PRODUCTION (canonical HR deploy for Wix runtime /quan-ly-nhan-su)
name: Deploy HR bundle to Wix

on:
  push:
    branches: [main]
    paths:
      - "production/jys_quan_ly_nhan_su.html"
      - "scripts/deploy-wix.mjs"
      - ".github/workflows/deploy-wix.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-wix
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy bundle to Wix Media + repoint Custom Embed
        env:
          WIX_API_KEY:  ${{ secrets.WIX_API_KEY }}
          API_URL:      ${{ secrets.API_URL }}
          WIX_SITE_ID:  ${{ vars.WIX_SITE_ID  || 'a3bfa336-e918-48e6-831b-82ed7ff178f5' }}
          WIX_EMBED_ID: ${{ vars.WIX_EMBED_ID || '516cefe5-e0bb-4b1c-9d06-5bb16dd6482f' }}
        run: node scripts/deploy-wix.mjs

      - name: Smoke-test bundle
        # Verifies the file uploaded by the deploy step is reachable on Wix's
        # CDN and contains an injected Apps Script URL (not the placeholder).
        # The live page at /?app=jys-hr may still serve the previous render
        # for 1-5 minutes due to Wix's SSR cache; that catches up on its own.
        run: |
          set -eu
          BUNDLE_URL=$(node -e "
            (async () => {
              const r = await fetch('https://www.wixapis.com/embeds/v1/custom-embeds/${{ vars.WIX_EMBED_ID || '516cefe5-e0bb-4b1c-9d06-5bb16dd6482f' }}', {
                headers: { Authorization: process.env.WIX_API_KEY, 'wix-site-id': '${{ vars.WIX_SITE_ID || 'a3bfa336-e918-48e6-831b-82ed7ff178f5' }}' },
              });
              const j = await r.json();
              const html = j.customEmbed?.embedData?.html || '';
              const m = html.match(/BUNDLE_URL = \"([^\"]+)\"/);
              if (!m) { process.exit(2); }
              process.stdout.write(m[1]);
            })().catch(e => { console.error(e); process.exit(3); });
          ")
          echo "Embed BUNDLE_URL: $BUNDLE_URL"
          curl -fsSL "$BUNDLE_URL" -o /tmp/bundle.txt
          ls -l /tmp/bundle.txt
          if grep -q '__API_URL__' /tmp/bundle.txt; then
            echo "FAIL: placeholder __API_URL__ still in deployed bundle" >&2; exit 1
          fi
          if ! grep -qE 'var API_URL = "https://script\.google\.com/macros/s/[^"]+/exec";' /tmp/bundle.txt; then
            echo "FAIL: deployed bundle has no Apps Script /exec URL" >&2; exit 1
          fi
          echo "Bundle OK. Live page propagates as Wix CDN cache expires."
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
